actions:
  intake:
    jiggle:
      trigger_mode: while_true
    manual:
      input_type: analog
      trigger_mode: scaled
      deadband: 0.05
    run:
      description: Runs the Inake
      trigger_mode: toggle_on_true
    deploy:
      description: Toggles if Intake is deployed or not
      trigger_mode: toggle_on_true
  drivetrain:
    speed:
      description: speedy driver drive
      input_type: analog
      trigger_mode: raw
      deadband: 0.05
    rotation:
      description: rotate the robot
      input_type: analog
      trigger_mode: squared
      deadband: 0.05
    plade:
      description: Yes you heard it..we went to plade
      input_type: output
controllers:
  0:
    name: Driver
    bindings:
      rumble_both:
      - drivetrain.plade
      right_stick_y:
      - drivetrain.rotation
      left_stick_y:
      - drivetrain.speed
  1:
    name: Operator
    bindings:
      y_button:
      - intake.jiggle
      right_stick_y:
      - intake.manual
      a_button:
      - intake.run
      left_bumper:
      - intake.deploy
