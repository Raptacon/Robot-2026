#
# Use this configuration file to control what RobotPy packages are installed
# on your RoboRIO
#

[tool.robotpy]

# Version of robotpy this project depends on
robotpy_version = "2026.2.1.1"

# Which extra RobotPy components should be installed
# -> equivalent to `pip install robotpy[extra1, ...]
components = [
    "all",
    #"apriltag",
    # "commands2",
    #"cscore",
    #"navx",
    #"pathplannerlib",
    #"phoenix5",
    #"phoenix6",
    #"playingwithfusion",
    #"rev",
    #"romi",
    #"sim",
]
# Other pip packages to install
# Must use python -m robotpy sync to install to cache
requires = [
    "numpy",
    "phoenix6",
    "robotpy-rev",
    "robotpy-navx",
    "robotpy-pathplannerlib",
    "photonlibpy",
    "robotpy-urcl"
]

pyfrc.isolated = true

[tool.pytest.ini_options]
# Exclude example directories from main test collection to avoid
# module name collisions (multiple pyfrc_test.py files)
testpaths = ["tests"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]
