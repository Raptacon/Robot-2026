name: Raptacon (Team 3200) CI Pipeline

on:
  push:
  pull_request:
  schedule:
    - cron: '0 2 * * *'

jobs:
  RobotUnitTestWindows:
    name: Unit / Integration Tests (Windows)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      timeout-minutes: 2
      uses: actions/setup-python@v5
      with:
        python-version: 3.14.*

    - name: Install dependencies
      timeout-minutes: 5
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Robotpy tests
      timeout-minutes: 1
      continue-on-error: False
      run: |
        python -m robotpy coverage test

  StaticCritical:
    name: Critical Static Analysis
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      timeout-minutes: 2
      uses: actions/setup-python@v5
      with:
        python-version: 3.14.*

    - name: Lint with flake8 critical
      timeout-minutes: 1
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F6,F7,F8,F4,W1,W2,W4,W5,W6,E11 --ignore=W293,W503 --show-source --statistics --exclude=tests/pyfrc*,utils/yaml/*,.venv*/,venv*/
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        
  ExtraStaticAnalysis:
    name: Extra Static Analysis
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      timeout-minutes: 2
      uses: actions/setup-python@v5
      with:
        python-version: 3.14.*

    - name: Lint with flake8 extra
      timeout-minutes: 1
      run: |
        pip install flake8
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --ignore E265,E232,W391,E302 --exclude */tests/pyfrc*,utils/yaml/*,.venv*/,venv*/
      # permissions:
      #       contents: read
      #       packages: read
      #       # To report GitHub Actions status checks
      #       statuses: write

  BuildDocs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: [RobotUnitTestWindows, StaticCritical]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      timeout-minutes: 2
      uses: actions/setup-python@v5
      with:
        python-version: 3.14.*

    - name: Install dependencies
      timeout-minutes: 5
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build documentation with pdoc
      timeout-minutes: 2
      run: |
        python3 doc/build_docs.py docs/

    - name: Upload docs artifact
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/

  DeployDocs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [BuildDocs]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Download docs artifact
      uses: actions/download-artifact@v4
      with:
        name: documentation
        path: docs/

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs/

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
