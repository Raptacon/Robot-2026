name: Raptacon (Team 3200) CI Pipeline

on:
  push:
  pull_request:
  schedule:
    - cron: '0 2 * * *'

jobs:
  RobotUnitTestWindows:
    name: Unit / Integration Tests (Windows)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      timeout-minutes: 2
      uses: actions/setup-python@v5
      with:
        python-version: 3.14.*

    - name: Install dependencies
      timeout-minutes: 5
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Robotpy tests
      timeout-minutes: 1
      continue-on-error: False
      run: |
        python -m robotpy coverage test
  DocStringStatic:
    name: Doc String Verification
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      timeout-minutes: 2
      uses: actions/setup-python@v5
      with:
        python-version: 3.14.*

    - name: Install dependencies
      timeout-minutes: 5
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Force docstrings
      timeout-minutes: 1
      continue-on-error: True
      run: |
        python3 robot.py test
      env:
              DOC_STRING_CHECK: True

  StaticCritical:
    name: Critical Static Analysis
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      timeout-minutes: 2
      uses: actions/setup-python@v5
      with:
        python-version: 3.14.*

    - name: Lint with flake8 critical
      timeout-minutes: 1
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F6,F7,F8,F4,W1,W2,W4,W5,W6,E11 --ignore=W293,W503 --show-source --statistics --exclude=tests/pyfrc*,utils/yaml/*,.venv*/,venv*/
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        
  ExtraStaticAnalysis:
    name: Extra Static Analysis
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      timeout-minutes: 2
      uses: actions/setup-python@v5
      with:
        python-version: 3.14.*

    - name: Lint with flake8 extra
      timeout-minutes: 1
      run: |
        pip install flake8
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --ignore E265,E232,W391,E302 --exclude */tests/pyfrc*,utils/yaml/*,.venv*/,venv*/
      # permissions:
      #       contents: read
      #       packages: read
      #       # To report GitHub Actions status checks
      #       statuses: write

  BuildDocs:
    name: Build & Deploy Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/nbeasley-flywheel-tuning')
    needs: [RobotUnitTestWindows, StaticCritical]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      timeout-minutes: 2
      uses: actions/setup-python@v5
      with:
        python-version: 3.14.*

    - name: Install dependencies
      timeout-minutes: 5
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build documentation with pdoc
      timeout-minutes: 2
      run: |
        python3 << 'SCRIPT'
        import importlib, subprocess, sys, os, glob

        # Top-level modules and package directories to document
        top_level = ['robot', 'robotswerve', 'config', 'photonUtils', 'physics']
        pkg_dirs = ['constants', 'subsystem', 'commands', 'utils', 'data']

        # Enumerate all individual module names
        candidates = list(top_level)
        for pkg_dir in pkg_dirs:
            for filepath in glob.glob(f'{pkg_dir}/**/*.py', recursive=True):
                if '__pycache__' in filepath:
                    continue
                mod = filepath.replace(os.sep, '.').replace('/', '.').removesuffix('.py')
                if mod.endswith('.__init__'):
                    mod = mod.removesuffix('.__init__')
                if mod not in candidates:
                    candidates.append(mod)

        # Test each module for importability, keep only working ones
        valid = []
        for mod in candidates:
            try:
                importlib.import_module(mod)
                valid.append(mod)
            except Exception as e:
                print(f'::warning::Skipping {mod}: {e}')

        if not valid:
            print('::error::No modules could be imported for documentation')
            sys.exit(1)

        print(f'Building docs for {len(valid)} modules: {" ".join(valid)}')
        result = subprocess.run(['pdoc', '-o', 'docs/'] + valid)
        sys.exit(result.returncode)
        SCRIPT

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs/

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
